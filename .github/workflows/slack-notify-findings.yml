name: Slack notify on new findings

on:
  push:
    branches: [main]
    paths:
      - 'new_learnings.md'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract new findings
        id: findings
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIFF=$(grep '^- \*\*' new_learnings.md | head -5)
          else
            DIFF=$(git diff HEAD~1 HEAD -- new_learnings.md | grep '^+- \*\*' | sed 's/^+//' || true)
          fi
          COUNT=$(echo "$DIFF" | grep -c '\*\*' || true)

          if [ "$COUNT" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          # Monta o texto da mensagem (Slack mrkdwn) e o serializa com jq.
          REPO_URL="https://github.com/${{ github.repository }}/blob/main/new_learnings.md"
          {
            echo "*Research Scout — $COUNT novidades em $(date '+%Y-%m-%d')*"
            echo ""
            echo "$DIFF"
            echo ""
            echo "<$REPO_URL|Ver lista completa>"
          } > /tmp/slack_text.txt

          jq -Rs '{text: .}' /tmp/slack_text.txt > /tmp/slack_payload.json

      - name: Send Slack notification
        if: steps.findings.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::error::Secret SLACK_WEBHOOK_URL não configurado."
            exit 1
          fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data @/tmp/slack_payload.json \
            "$SLACK_WEBHOOK_URL"
